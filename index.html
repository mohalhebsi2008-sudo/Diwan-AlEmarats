<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ديوان الإمارات</title>

  <!-- خط عربي جميل (مفتوح المصدر) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="header">
  <div class="container head-inner">
    <div class="brand">
      <div class="logo">د</div>
      <div>
        <h1>ديوان الإمارات</h1>
        <p class="sub">ابحث عن الشاعر أو ابحث بحثًا عامًا في كل الديوان.</p>

        <div class="counters">
          <span class="pill" id="countPoets">—</span>
          <span class="pill" id="countPoems">—</span>
        </div>
      </div>
    </div>
    <div class="ornament" aria-hidden="true"></div>
  </div>
</header>

<main class="container layout">
  <!-- Sidebar -->
  <aside class="panel">
    <div class="panel-title">⭐ قصيدة اليوم</div>
    <div id="poemOfDay" class="pod-card">
      <div class="pod-title">—</div>
      <div class="pod-meta">—</div>
      <button id="openPoD" class="btn primary" disabled>فتح قصيدة اليوم</button>
    </div>

    <div class="divider"></div>

    <div class="panel-title">🔎 بحث عام (كل الديوان)</div>
    <label class="field">
      <span>ابحث باسم القصيدة / كلمة من النص / وسم</span>
      <input id="globalSearch" type="text" placeholder="مثال: وطني / زايد / حكمة..." />
    </label>
    <div id="globalResults" class="poems"></div>

    <div class="divider"></div>

    <div class="panel-title">👤 الشعراء</div>
    <label class="field">
      <span>ابحث عن شاعر</span>
      <input id="poetSearch" type="text" placeholder="مثال: زايد / الخضر..." />
    </label>

    <div class="divider"></div>
    <div id="poetsList" class="list"></div>

    <div class="note">
      إضافة النصوص الأصلية تكون من <code>data.js</code> (الصق نص القصيدة في خانة <code>text</code>).
    </div>
  </aside>

  <!-- Content -->
  <section class="content">
    <div class="panel content-panel">
      <div class="content-head">
        <div>
          <h2 id="poetName">اختر شاعر</h2>
          <p id="poetMeta" class="meta">—</p>
        </div>
        <button id="clearBtn" class="btn ghost">إلغاء الاختيار</button>
      </div>

      <div class="divider"></div>

      <div class="grid2">
        <label class="field">
          <span>ابحث داخل قصايد الشاعر</span>
          <input id="poemSearch" type="text" placeholder="عنوان القصيدة أو كلمة..." disabled />
        </label>

        <label class="field">
          <span>تصنيف</span>
          <select id="tagFilter" disabled>
            <option value="">كل التصنيفات</option>
          </select>
        </label>
      </div>

      <div id="poemsList" class="poems"></div>
    </div>

    <!-- Poem viewer -->
    <div class="panel viewer">
      <div class="viewer-head">
        <div>
          <h3 id="poemTitle">—</h3>
          <p id="poemInfo" class="meta">—</p>
        </div>
        <div class="viewer-actions">
          <button id="copyBtn" class="btn primary" disabled>📋 نسخ القصيدة</button>
        </div>
      </div>

      <div class="divider"></div>

      <pre id="poemText" class="poem-text">اختر شاعر ثم قصيدة.</pre>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    <span>© ديوان الإمارات — تصميم أحمر وأبيض بطابع تراثي</span>
  </div>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
